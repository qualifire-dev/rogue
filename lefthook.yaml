pre-commit:
  parallel: true
  jobs:
    - name: gitleaks
      run: gitleaks protect --verbose --redact --staged

    - name: end-of-file-fixer
      glob: "*"
      exclude: "LICENSE"
      run: |
        for file in {staged_files}; do
          if [ -n "$(tail -c 1 "$file")" ]; then
            echo >> "$file"
            git add "$file"
          fi
        done

    # YAML
    - name: check-yaml
      glob: "*.{yaml,yml}"
      run: |
        for file in {staged_files}; do
          python -c "import yaml; yaml.safe_load(open('$file'))" || exit 1
        done

    # Python
    - name: add-trailing-comma
      glob: "*.py"
      run: add-trailing-comma {staged_files}

    - name: isort
      glob: "*.py"
      run: isort --profile black {staged_files}

    - name: black
      glob: "*.py"
      exclude: ".venv/"
      run: black {staged_files}

    - name: flake8
      glob: "*.py"
      run: flake8 {staged_files}

    - name: mypy
      glob: "*.py"
      run: mypy --config-file .mypy.ini {staged_files}

    - name: bandit
      glob: "*.py"
      run: bandit -c .bandit.yaml -r {staged_files}

    - name: uv lock check
      glob: "pyproject.toml"
      run: uv lock --check

    # Go
    - name: gofmt
      glob: "*.go"
      run: gofmt -s -w {staged_files}

    - name: goimports
      glob: "*.go"
      run: goimports -w {staged_files}

    - name: go vet
      glob: "*.go"
      run: (cd packages/tui && go vet ./...)

    # Web (TypeScript / React)
    # `root:` rebases {staged_files} so they're relative to packages/web,
    # which is what prettier/eslint expect when their config lives there.
    - name: prettier-web
      root: "packages/web/"
      glob: "*.{ts,tsx,js,jsx,json,css,md}"
      run: pnpm exec prettier --write {staged_files}

    - name: eslint-web
      root: "packages/web/"
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm exec eslint --fix {staged_files}

    - name: tsc-web
      glob: "packages/web/**/*.{ts,tsx}"
      run: (cd packages/web && pnpm exec tsc --noEmit)
